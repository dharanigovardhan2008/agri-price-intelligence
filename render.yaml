@"
services:
  - type: web
    name: agri-price-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()'
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
"@ | Out-File -FilePath render.yaml -Encoding utf8
